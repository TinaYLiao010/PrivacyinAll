"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article7", "dimension": "BasicDefinition", "content_original": "第六条 处理个人信息应当具有明确、合理的目的,并应当与处理目的直接相关,采取对个人权益影响最小的方式。 收集个人信息,应当限于实现处理目的的最小范围,不得过度收集个人信息。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article8", "dimension": "BasicDefinition", "content_original": "第七条 处理个人信息应当遵循公开、透明原则,公开个人信息处理规则,明示处理的目的、方式和范围。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article9", "dimension": "DataControllerObligation", "content_original": "第八条 处理个人信息应当保证个人信息的质量,避免因个人信息不准确、不完整对个人权益造成不利影响。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article10", "dimension": "DataControllerObligation", "content_original": "第九条 个人信息处理者应当对其个人信息处理活动负责,并采取必要措施保障所处理的个人信息的安全。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article11", "dimension": "DataControllerObligation", "content_original": "第十条 任何组织、个人不得非法收集、使用、加工、传输他人个人信息,不得非法买卖、提供或者公开他人个人信息;不得从事危害国家安全、公共利益的个人信息处理活动。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article12", "dimension": "DataControllerObligation", "content_original": "第十一条 国家建立健全个人信息保护制度,预防和惩治侵害个人信息权益的行为,加强个人信息保护宣传教育,推动形成政府、企业、相关社会组织、公众共同参与个人信息保护的良好环境。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article13", "dimension": "DataControllerObligation", "content_original": "第十二条 国家积极参与个人信息保护国际规则的制定,促进个人信息保护方面的国际交流与合作,推动与其他国家、地区、国际组织之间的个人信息保护规则、标准等互认。 第二章 个人信息处理规则 第一节 一般规定", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article14", "dimension": "DataControllerObligation", "content_original": "第十三条 符合下列情形之一的,个人信息处理者方可处理个人信息: （一）取得个人的同意； （二）为订立、履行个人作为一方当事人的合同所必需,或者按照依法制定的劳动规章制度和依法签订的集体合同实施人力资源管理所必需； （三）为履行法定职责或者法定义务所必需； （四）为应对突发公共卫生事件,或者紧急情况下为保护自然人的生命健康和财产安全所必需； （五）为公共利益实施新闻报道、舆论监督等行为,在合理的范围内处理个人信息； （六）依照本法规定在合理的范围内处理个人自行公开或者其他已经合法公开的个人信息； （七）法律、行政法规规定的其他情形。 依照本法其他有关规定,处理个人信息应当取得个人同意,但是有前款第二项至第七项规定情形的,不需取得个人同意。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article15", "dimension": "BasicDefinition", "content_original": "第十四条 基于个人同意处理个人信息的,该同意应当由个人在充分知情的前提下自愿、明确作出。法律、行政法规规定处理个人信息应当取得个人单独同意或者书面同意的,从其规定。 个人信息的处理目的、处理方式和处理的个人信息种类发生变更的,应当重新取得个人同意。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article16", "dimension": "DataSubjectRight", "content_original": "第十五条 基于个人同意处理个人信息的,个人有权撤回其同意。个人信息处理者应当提供便捷的撤回同意的方式。 个人撤回同意,不影响撤回前基于个人同意已进行的个人信息处理活动的效力。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article17", "dimension": "DataSubjectRight", "content_original": "第十六条 个人信息处理者不得以个人不同意处理其个人信息或者撤回同意为由,拒绝提供产品或者服务;处理个人信息属于提供产品或者服务所必需的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article18", "dimension": "BasicDefinition", "content_original": "第十七条 个人信息处理者在处理个人信息前,应当以显著方式、清晰易懂的语言真实、准确、完整地向个人告知下列事项: （一）个人信息处理者的名称或者姓名和联系方式； （二）个人信息的处理目的、处理方式,处理的个人信息种类、保存期限； （三）个人行使本法规定权利的方式和程序； （四）法律、行政法规规定应当告知的其他事项。 前款规定事项发生变更的,应当将变更部分告知个人。 个人信息处理者通过制定个人信息处理规则的方式告知第一款规定事项的,处理规则应当公开,并且便于查阅和保存。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article19", "dimension": "DataControllerObligation", "content_original": "第十八条 个人信息处理者处理个人信息,有法律、行政法规规定应当保密或者不需要告知的情形的,可以不向个人告知前条第一款规定的事项。 紧急情况下为保护自然人的生命健康和财产安全无法及时向个人告知的,个人信息处理者应当在紧急情况消除后及时告知。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article20", "dimension": "BasicDefinition", "content_original": "第十九条 除法律、行政法规另有规定外,个人信息的保存期限应当为实现处理目的所必要的最短时间。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article21", "dimension": "BasicDefinition", "content_original": "第二十条 两个以上的个人信息处理者共同决定个人信息的处理目的和处理方式的,应当约定各自的权利和义务。但是,该约定不影响个人向其中任何一个个人信息处理者要求行使本法规定的权利。 个人信息处理者共同处理个人信息,侵害个人信息权益造成损害的,应当依法承担连带责任。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article22", "dimension": "BasicDefinition", "content_original": "第二十一条 个人信息处理者委托处理个人信息的,应当与受托人约定委托处理的目的、期限、处理方式、个人信息的种类、保护措施以及双方的权利和义务等,并对受托人的个人信息处理活动进行监督。 受托人应当按照约定处理个人信息,不得超出约定的处理目的、处理方式等处理个人信息;委托合同不生效、无效、被撤销或者终止的,受托人应当将个人信息返还个人信息处理者或者予以删除,不得保留。 未经个人信息处理者同意,受托人不得转委托他人处理个人信息。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article23", "dimension": "BasicDefinition", "content_original": "第二十二条 个人信息处理者因合并、分立、解散、被宣告破产等原因需要转移个人信息的,应当向个人告知接收方的名称或者姓名和联系方式。接收方应当继续履行个人信息处理者的义务。接收方变更原先的处理目的、处理方式的,应当依照本法规定重新取得个人同意。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article24", "dimension": "BasicDefinition", "content_original": "第二十三条 个人信息处理者向其他个人信息处理者提供其处理的个人信息的,应当向个人告知接收方的名称或者姓名、联系方式、处理目的、处理方式和个人信息的种类,并取得个人的单独同意。接收方应当在上述处理目的、处理方式和个人信息的种类等范围内处理个人信息。接收方变更原先的处理目的、处理方式的,应当依照本法规定重新取得个人同意。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article25", "dimension": "DataControllerObligation", "content_original": "第二十四条 个人信息处理者利用个人信息进行自动化决策,应当保证决策的透明度和结果公平、公正,不得对个人在交易价格等交易条件上实行不合理的差别待遇。 通过自动化决策方式向个人进行信息推送、商业营销,应当同时提供不针对其个人特征的选项,或者向个人提供便捷的拒绝方式。 通过自动化决策方式作出对个人权益有重大影响的决定,个人有权要求个人信息处理者予以说明,并有权拒绝个人信息处理者仅通过自动化决策的方式作出决定。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article26", "dimension": "DataControllerObligation", "content_original": "第二十五条 个人信息处理者不得公开其处理的个人信息,取得个人单独同意的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article27", "dimension": "BasicDefinition", "content_original": "第二十六条 在公共场所安装图像采集、个人身份识别设备,应当为维护公共安全所必需,遵守国家有关规定,并设置显著的提示标识。所收集的个人图像、身份识别信息只能用于维护公共安全的目的,不得用于其他目的;取得个人单独同意的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article28", "dimension": "DataControllerObligation", "content_original": "第二十七条 个人信息处理者可以在合理的范围内处理个人自行公开或者其他已经合法公开的个人信息;个人明确拒绝的除外。个人信息处理者处理已公开的个人信息,对个人权益有重大影响的,应当依照本法规定取得个人同意。 第二节 敏感个人信息的处理规则", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article29", "dimension": "BasicDefinition", "content_original": "第二十八条 敏感个人信息是一旦泄露或者非法使用,容易导致自然人的人格尊严受到侵害或者人身、财产安全受到危害的个人信息,包括生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等信息,以及不满十四周岁未成年人的个人信息。 只有在具有特定的目的和充分的必要性,并采取严格保护措施的情形下,个人信息处理者方可处理敏感个人信息。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article30", "dimension": "DataControllerObligation", "content_original": "第二十九条 处理敏感个人信息应当取得个人的单独同意;法律、行政法规规定处理敏感个人信息应当取得书面同意的,从其规定。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article31", "dimension": "DataControllerObligation", "content_original": "第三十条 个人信息处理者处理敏感个人信息的,除本法第十七条第一款规定的事项外,还应当向个人告知处理敏感个人信息的必要性以及对个人权益的影响;依照本法规定可以不向个人告知的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article32", "dimension": "MinorProtection", "content_original": "第三十一条 个人信息处理者处理不满十四周岁未成年人个人信息的,应当取得未成年人的父母或者其他监护人的同意。 个人信息处理者处理不满十四周岁未成年人个人信息的,应当制定专门的个人信息处理规则。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article33", "dimension": "DataControllerObligation", "content_original": "第三十二条 法律、行政法规对处理敏感个人信息规定应当取得相关行政许可或者作出其他限制的,从其规定。 第三节 国家机关处理个人信息的特别规定", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article34", "dimension": "DataControllerObligation", "content_original": "第三十三条 国家机关处理个人信息的活动,适用本法;本节有特别规定的,适用本节规定。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article35", "dimension": "DataControllerObligation", "content_original": "第三十四条 国家机关为履行法定职责处理个人信息,应当依照法律、行政法规规定的权限、程序进行,不得超出履行法定职责所必需的范围和限度。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article36", "dimension": "DataControllerObligation", "content_original": "第三十五条 国家机关为履行法定职责处理个人信息,应当依照本法规定履行告知义务;有本法第十八条第一款规定的情形,或者告知将妨碍国家机关履行法定职责的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article37", "dimension": "DataControllerObligation", "content_original": "第三十六条 国家机关处理的个人信息应当在中华人民共和国境内存储;确需向境外提供的,应当进行安全评估。安全评估可以要求有关部门提供支持与协助。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article38", "dimension": "CrossBorderTransfer", "content_original": "第三十七条 法律、法规授权的具有管理公共事务职能的组织为履行法定职责处理个人信息,适用本法关于国家机关处理个人信息的规定。 第三章 个人信息跨境提供的规则", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article39", "dimension": "DataControllerObligation", "content_original": "第三十八条 个人信息处理者因业务等需要,确需向中华人民共和国境外提供个人信息的,应当具备下列条件之一:", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article40", "dimension": "DataControllerObligation", "content_original": "（一）依照本法第四十条的规定通过国家网信部门组织的安全评估； （二）按照国家网信部门的规定经专业机构进行个人信息保护认证； （三）按照国家网信部门制定的标准合同与境外接收方订立合同,约定双方的权利和义务； （四）法律、行政法规或者国家网信部门规定的其他条件。 中华人民共和国缔结或者参加的国际条约、协定对向中华人民共和国境外提供个人信息的条件等有规定的,可以按照其规定执行。 个人信息处理者应当采取必要措施,保障境外接收方处理个人信息的活动达到本法规定的个人信息保护标准。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article41", "dimension": "BasicDefinition", "content_original": "第三十九条 个人信息处理者向中华人民共和国境外提供个人信息的,应当向个人告知境外接收方的名称或者姓名、联系方式、处理目的、处理方式、个人信息的种类以及个人向境外接收方行使本法规定权利的方式和程序等事项,并取得个人的单独同意。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article42", "dimension": "DataControllerObligation", "content_original": "第四十条 关键信息基础设施运营者和处理个人信息达到国家网信部门规定数量的个人信息处理者,应当将在中华人民共和国境内收集和产生的个人信息存储在境内。确需向境外提供的,应当通过国家网信部门组织的安全评估;法律、行政法规和国家网信部门规定可以不进行安全评估的,从其规定。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article43", "dimension": "DataControllerObligation", "content_original": "第四十一条 中华人民共和国主管机关根据有关法律和中华人民共和国缔结或者参加的国际条约、协定,或者按照平等互惠原则,处理外国司法或者执法机构关于提供存储于境内个人信息的请求。非经中华人民共和国主管机关批准,个人信息处理者不得向外国司法或者执法机构提供存储于中华人民共和国境内的个人信息。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article44", "dimension": "DataControllerObligation", "content_original": "第四十二条 境外的组织、个人从事侵害中华人民共和国公民的个人信息权益,或者危害中华人民共和国国家安全、公共利益的个人信息处理活动的,国家网信部门可以将其列入限制或者禁止个人信息提供清单,予以公告,并采取限制或者禁止向其提供个人信息等措施。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article45", "dimension": "DataControllerObligation", "content_original": "第四十三条 任何国家或者地区在个人信息保护方面对中华人民共和国采取歧视性的禁止、限制或者其他类似措施的,中华人民共和国可以根据实际情况对该国家或者地区对等采取措施。 第四章 个人在个人信息处理活动中的权利", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article46", "dimension": "DataControllerObligation", "content_original": "第四十四条 个人对其个人信息的处理享有知情权、决定权,有权限制或者拒绝他人对其个人信息进行处理;法律、行政法规另有规定的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article47", "dimension": "DataSubjectRight", "content_original": "第四十五条 个人有权向个人信息处理者查阅、复制其个人信息;有本法第十八条第一款、第三十五条规定情形的除外。 个人请求查阅、复制其个人信息的,个人信息处理者应当及时提供。 个人请求将个人信息转移至其指定的个人信息处理者,符合国家网信部门规定条件的,个人信息处理者应当提供转移的途径。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article48", "dimension": "DataControllerObligation", "content_original": "第四十六条 个人发现其个人信息不准确或者不完整的,有权请求个人信息处理者更正、补充。 个人请求更正、补充其个人信息的,个人信息处理者应当对其个人信息予以核实,并及时更正、补充。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article49", "dimension": "BasicDefinition", "content_original": "第四十七条 有下列情形之一的,个人信息处理者应当主动删除个人信息;个人信息处理者未删除的,个人有权请求删除: （一）处理目的已实现、无法实现或者为实现处理目的不再必要； （二）个人信息处理者停止提供产品或者服务,或者保存期限已届满； （三）个人撤回同意； （四）个人信息处理者违反法律、行政法规或者违反约定处理个人信息； （五）法律、行政法规规定的其他情形。 法律、行政法规规定的保存期限未届满,或者删除个人信息从技术上难以实现的,个人信息处理者应当停止除存储和采取必要的安全保护措施之外的处理。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article50", "dimension": "DataControllerObligation", "content_original": "第四十八条 个人有权要求个人信息处理者对其个人信息处理规则进行解释说明。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article51", "dimension": "DataSubjectRight", "content_original": "第四十九条 自然人死亡的,其近亲属为了自身的合法、正当利益,可以对死者的相关个人信息行使本章规定的查阅、复制、更正、删除等权利;死者生前另有安排的除外。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article52", "dimension": "DataControllerObligation", "content_original": "第五十条 个人信息处理者应当建立便捷的个人行使权利的申请受理和处理机制。拒绝个人行使权利的请求的,应当说明理由。 个人信息处理者拒绝个人行使权利的请求的,个人可以依法向人民法院提起诉讼。 第五章 个人信息处理者的义务", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article53", "dimension": "BasicDefinition", "content_original": "第五十一条 个人信息处理者应当根据个人信息的处理目的、处理方式、个人信息的种类以及对个人权益的影响、可能存在的安全风险等,采取下列措施确保个人信息处理活动符合法律、行政法规的规定,并防止未经授权的访问以及个人信息泄露、篡改、丢失: （一）制定内部管理制度和操作规程； （二）对个人信息实行分类管理； （三）采取相应的加密、去标识化等安全技术措施； （四）合理确定个人信息处理的操作权限,并定期对从业人员进行安全教育和培训； （五）制定并组织实施个人信息安全事件应急预案； （六）法律、行政法规规定的其他措施。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article54", "dimension": "DataControllerObligation", "content_original": "第五十二条 处理个人信息达到国家网信部门规定数量的个人信息处理者应当指定个人信息保护负责人,负责对个人信息处理活动以及采取的保护措施等进行监督。 个人信息处理者应当公开个人信息保护负责人的联系方式,并将个人信息保护负责人的姓名、联系方式等报送履行个人信息保护职责的部门。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article55", "dimension": "DataControllerObligation", "content_original": "第五十三条 本法第三条第二款规定的中华人民共和国境外的个人信息处理者,应当在中华人民共和国境内设立专门机构或者指定代表,负责处理个人信息保护相关事务,并将有关机构的名称或者代表的姓名、联系方式等报送履行个人信息保护职责的部门。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article56", "dimension": "DataControllerObligation", "content_original": "第五十四条 个人信息处理者应当定期对其处理个人信息遵守法律、行政法规的情况进行合规审计。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article57", "dimension": "DataControllerObligation", "content_original": "第五十五条 有下列情形之一的,个人信息处理者应当事前进行个人信息保护影响评估,并对处理情况进行记录: （一）处理敏感个人信息； （二）利用个人信息进行自动化决策； （三）委托处理个人信息、向其他个人信息处理者提供个人信息、公开个人信息； （四）向境外提供个人信息； （五）其他对个人权益有重大影响的个人信息处理活动。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article58", "dimension": "BasicDefinition", "content_original": "第五十六条 个人信息保护影响评估应当包括下列内容: （一）个人信息的处理目的、处理方式等是否合法、正当、必要； （二）对个人权益的影响及安全风险； （三）所采取的保护措施是否合法、有效并与风险程度相适应。 个人信息保护影响评估报告和处理情况记录应当至少保存三年。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article59", "dimension": "DataControllerObligation", "content_original": "第五十七条 发生或者可能发生个人信息泄露、篡改、丢失的,个人信息处理者应当立即采取补救措施,并通知履行个人信息保护职责的部门和个人。通知应当包括下列事项: （一）发生或者可能发生个人信息泄露、篡改、丢失的信息种类、原因和可能造成的危害； （二）个人信息处理者采取的补救措施和个人可以采取的减轻危害的措施； （三）个人信息处理者的联系方式。 个人信息处理者采取措施能够有效避免信息泄露、篡改、丢失造成危害的,个人信息处理者可以不通知个人;履行个人信息保护职责的部门认为可能造成危害的,有权要求个人信息处理者通知个人。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article60", "dimension": "DataControllerObligation", "content_original": "第五十八条 提供重要互联网平台服务、用户数量巨大、业务类型复杂的个人信息处理者,应当履行下列义务: （一）按照国家规定建立健全个人信息保护合规制度体系,成立主要由外部成员组成的独立机构对个人信息保护情况进行监督； （二）遵循公开、公平、公正的原则,制定平台规则,明确平台内产品或者服务提供者处理个人信息的规范和保护个人信息的义务； （三）对严重违反法律、行政法规处理个人信息的平台内的产品或者服务提供者,停止提供服务； （四）定期发布个人信息保护社会责任报告,接受社会监督。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article61", "dimension": "DataControllerObligation", "content_original": "第五十九条 接受委托处理个人信息的受托人,应当依照本法和有关法律、行政法规的规定,采取必要措施保障所处理的个人信息的安全,并协助个人信息处理者履行本法规定的义务。 第六章 履行个人信息保护职责的部门", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article62", "dimension": "DataControllerObligation", "content_original": "第六十条 国家网信部门负责统筹协调个人信息保护工作和相关监督管理工作。国务院有关部门依照本法和有关法律、行政法规的规定,在各自职责范围内负责个人信息保护和监督管理工作。 县级以上地方人民政府有关部门的个人信息保护和监督管理职责,按照国家有关规定确定。 前两款规定的部门统称为履行个人信息保护职责的部门。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article63", "dimension": "DataControllerObligation", "content_original": "第六十一条 履行个人信息保护职责的部门履行下列个人信息保护职责: （一）开展个人信息保护宣传教育,指导、监督个人信息处理者开展个人信息保护工作； （二）接受、处理与个人信息保护有关的投诉、举报； （三）组织对应用程序等个人信息保护情况进行测评,并公布测评结果； （四）调查、处理违法个人信息处理活动； （五）法律、行政法规规定的其他职责。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article64", "dimension": "DataControllerObligation", "content_original": "第六十二条 国家网信部门统筹协调有关部门依据本法推进下列个人信息保护工作: （一）制定个人信息保护具体规则、标准； （二）针对小型个人信息处理者、处理敏感个人信息以及人脸识别、人工智能等新技术、新应用,制定专门的个人信息保护规则、标准； （三）支持研究开发和推广应用安全、方便的电子身份认证技术,推进网络身份认证公共服务建设； （四）推进个人信息保护社会化服务体系建设,支持有关机构开展个人信息保护评估、认证服务； （五）完善个人信息保护投诉、举报工作机制。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article65", "dimension": "DataSubjectRight", "content_original": "第六十三条 履行个人信息保护职责的部门在履行职责,可以采取下列措施: （一）询问有关当事人,调查与个人信息处理活动有关的情况； （二）查阅、复制当事人与个人信息处理活动有关的合同、记录、账簿以及其他有关资料； （三）实施现场检查,对涉嫌违法的个人信息处理活动进行调查； （四）检查与个人信息处理活动有关的设备、物品;对有证据证明是用于违法个人信息处理活动的设备、物品,向本部门主要负责人书面报告并经批准,可以查封或者扣押。 履行个人信息保护职责的部门依法履行职责,当事人应当予以协助、配合,不得拒绝、阻挠。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article66", "dimension": "DataControllerObligation", "content_original": "第六十四条 履行个人信息保护职责的部门在履行职责中,发现个人信息处理活动存在较大风险或者发生个人信息安全事件的,可以按照规定的权限和程序对该个人信息处理者的法定代表人或者主要负责人进行约谈,或者要求个人信息处理者委托专业机构对其个人信息处理活动进行合规审计。个人信息处理者应当按照要求采取措施,进行整改,消除隐患。 履行个人信息保护职责的部门在履行职责中,发现违法处理个人信息涉嫌犯罪的,应当及时移送公安机关依法处理。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article67", "dimension": "DataControllerObligation", "content_original": "第六十五条 任何组织、个人有权对违法个人信息处理活动向履行个人信息保护职责的部门进行投诉、举报。收到投诉、举报的部门应当依法及时处理,并将处理结果告知投诉、举报人。 履行个人信息保护职责的部门应当公布接受投诉、举报的联系方式。 第七章 法律责任", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article68", "dimension": "DataControllerObligation", "content_original": "第六十六条 违反本法规定处理个人信息,或者处理个人信息未履行本法规定的个人信息保护义务的,由履行个人信息保护职责的部门责令改正,给予警告,没收违法所得,对违法处理个人信息的应用程序,责令暂停或者终止提供服务;拒不改正的,并处一百万元以下罚款;对直接负责的主管人员和其他直接责任人员处一万元以上十万元以下罚款。 有前款规定的违法行为,情节严重的,由省级以上履行个人信息保护职责的部门责令改正,没收违法所得,并处五千万元以下或者上一年度营业额百分之五以下罚款,并可以责令暂停相关业务或者停业整顿、通报有关主管部门吊销相关业务许可或者吊销营业执照;对直接负责的主管人员和其他直接责任人员处十万元以上一百万元以下罚款,并可以决定禁止其在一定期限内担任相关企业的董事、监事、高级管理人员和个人信息保护负责人。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article69", "dimension": "DataControllerObligation", "content_original": "第六十七条 有本法规定的违法行为的,依照有关法律、行政法规的规定记入信用档案,并予以公示。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article70", "dimension": "DataControllerObligation", "content_original": "第六十八条 国家机关不履行本法规定的个人信息保护义务的,由其上级机关或者履行个人信息保护职责的部门责令改正;对直接负责的主管人员和其他直接责任人员依法给予处分。 履行个人信息保护职责的部门的工作人员玩忽职守、滥用职权、徇私舞弊,尚不构成犯罪的,依法给予处分。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article71", "dimension": "DataControllerObligation", "content_original": "第六十九条 处理个人信息侵害个人信息权益造成损害,个人信息处理者不能证明自己没有过错的,应当承担损害赔偿等侵权责任。 前款规定的损害赔偿责任按照个人因此受到的损失或者个人信息处理者因此获得的利益确定;个人因此受到的损失和个人信息处理者因此获得的利益难以确定的,根据实际情况确定赔偿数额。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article72", "dimension": "DataControllerObligation", "content_original": "第七十条 个人信息处理者违反本法规定处理个人信息,侵害众多个人的权益的,人民检察院、法律规定的消费者组织和由国家网信部门确定的组织可以依法向人民法院提起诉讼。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article73", "dimension": "DataControllerObligation", "content_original": "第七十一条 违反本法规定,构成违反治安管理行为的,依法给予治安管理处罚;构成犯罪的,依法追究刑事责任。 第八章 附 则", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article74", "dimension": "DataControllerObligation", "content_original": "第七十二条 自然人因个人或者家庭事务处理个人信息的,不适用本法。 法律对各级人民政府及其有关部门组织实施的统计、档案管理活动中的个人信息处理有规定的,适用其规定。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article75", "dimension": "BasicDefinition", "content_original": "第七十三条 本法下列用语的含义: （一）个人信息处理者,是指在个人信息处理活动中自主决定处理目的、处理方式的组织、个人。 （二）自动化决策,是指通过计算机程序自动分析、评估个人的行为习惯、兴趣爱好或者经济、健康、信用状况等,并进行决策的活动。 （三）去标识化,是指个人信息经过处理,使其在不借助额外信息的情况下无法识别特定自然人的过程。 （四）匿名化,是指个人信息经过处理无法识别特定自然人且不能复原的过程。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "CN_PIPL", "law_name_en": "", "clause_no": "Chapter1-Article76", "dimension": "DataControllerObligation", "content_original": "第七十四条 本法自2021年11月1日起施行。 > （注：部分内容可能由 AI 生成）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article1", "dimension": "DataControllerObligation", "content_original": " # KR\\\\-PIPA 韩国个人信息保护法｜结构化归档文档（投产级）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article2", "dimension": "CrossBorderTransfer", "content_original": "## 基础元数据（入库固定字段） - **法域编码\\\\(law\\\\_code\\\\)**：KR\\\\-PIPA - **法规全称\\\\(law\\\\_name\\\\)**：韩国个人信息保护法（Personal Information Protection Act） - **初始制定日期**：2011年03月29日（第10465号法案） - **最新修订日期**：2023年03月14日（第19234号法案） - **结构化标准**：投产级拆分｜单条单语义｜多语对照｜维度分类｜支持SQL/Excel直接入库 - **适用法域**：大韩民国（韩国） - **核心定位**：韩国个人信息保护基础性通用法律，规范全境个人信息处理、保护、跨境传输及监管全流程 ---", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article3", "dimension": "DataControllerObligation", "content_original": "# 第一章 总则（第1条\\\\-第6条）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article4", "dimension": "BasicDefinition", "content_original": "## 第一条（立法目的） **【英文原文】**The purpose of this Act is to protect the freedom and rights of individuals, and further, to realize the dignity and value of the individuals, by prescribing the processing and protection of personal information\\\\. **【韩文原文】**이 법은 개인정보의 처리 및 보호에 관한 사항을 정함으로써 개인의 자유와 권리를 보호하고, 나아가 개인의 존엄과 가치를 구현함을 목적으로 한다\\\\. **【维度】**基础定义 **【释义】**确立韩国个人信息保护法核心立法宗旨，通过规范个人信息的处理与保护行为，保障自然人的自由与合法权益，实现个人人格尊严与核心价值，是整部法案的立法基础。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article5", "dimension": "BasicDefinition", "content_original": "## 第二条（术语定义） **【英文原文】**The terms used in this Act are defined as follows: 1\\\\. The term \\"personal information\\" means any of the following information relating to a living individual: \\\\(a\\\\) Information that identifies a particular individual by his or her full name, resident registration number, pictures, etc\\\\.; \\\\(b\\\\) Information which, even if it by itself does not uniquely identify an individual, may be easily combined with other information to uniquely identify an individual; \\\\(c\\\\) Pseudonymized information that becomes incapable of uniquely identifying an individual without restoration information\\\\. 1\\\\-2\\\\. The term “pseudonymization” means a procedure to process personal information so that the information cannot uniquely identify an individual without additional information\\\\. 2\\\\. The term “processing” means the collection, generation, connecting, interlocking, recording, storage, retention, value\\\\-added processing, editing, searching, output, correction, recovery, use, provision, disclosure, and destruction of personal information and other similar activities\\\\. 3\\\\. The term “data subject” means an individual who is identifiable through processed personal information\\\\. 4\\\\. The term “personal information file” means a systematically organized set of personal information for easy search\\\\. 5\\\\. The term “personal information controller” means institutions, organizations or individuals that process personal information for business purposes\\\\. 6\\\\. The term \\"public institution\\" means administrative bodies of state institutions, central and local administrative agencies, and other public entities prescribed by Presidential Decree\\\\. 7\\\\. The term “fixed visual data processing device” means fixed installed devices for continuous image shooting and transmission\\\\. 7\\\\-2\\\\. The term “mobile visual data processing device” means wearable or portable mobile image processing devices\\\\. 8\\\\. The term “scientific research” means technological development, basic and applied research, privately funded research adopting scientific methods\\\\. **【韩文原文】**이 법에서 사용하는 용어의 뜻은 다음과 같다\\\\. 1\\\\. “개인정보”란 살아 있는 개인에 관한 정보로서 성명, 주민등록번호 및 영상 등으로 개인을 알아볼 수 있는 정보, 다른 정보와 쉽게 결합하여 특정 개인을 알아볼 수 있는 정보, 가명처리되어 복원정보 없이는 특정 개인을 식별할 수 없는 정보를 말한다\\\\. 1의2\\\\. “가명처리”란 추가 정보 없이는 특정 개인을 식별할 수 없도록 개인정보를 삭제·대체 처리하는 절차를 말한다\\\\. 2\\\\. “처리”란 개인정보의 수집, 생성, 연계, 기록, 저장, 가공, 검색, 정정, 이용, 제공, 공개, 파기 등 유사한 행위를 말한다\\\\. 3\\\\. “정보주체”란 처리되는 정보로 식별 가능한 개인을 말한다\\\\. 4\\\\. “개인정보파일”란 검색이 용이하도록 체계적으로 구성된 개인정보 집합물을 말한다\\\\. 5\\\\. “개인정보처리자”란 업무 목적으로 개인정보를 처리하는 공공기관, 법인, 단체 및 개인을 말한다\\\\. 6\\\\. “공공기관”란 국회, 법원, 중앙·지방 행정기관, 대통령령으로 정하는 공공단체를 말한다\\\\. 7\\\\. “고정형 영상정보처리기기”란 고정 설치되어 지속적으로 영상을 촬영·전송하는 장치를 말한다\\\\. 7의2\\\\. “이동형 영상정보처리기기”란 착용·휴대 가능한 이동식 영상 촬영·전송 장치를 말한다\\\\. 8\\\\. “과학적 연구”란 기술개발, 기초·응용연구, 민간투자 연구 등 과학적 방법을 적용한 연구를 말한다\\\\. **【维度】**基础定义 **【释义】**统一界定本法全部核心专业术语，明确个人信息、假名处理、信息处理行为、数据主体、信息处理者、公共机构、固定/移动影像设备、科学研究的法定内涵与边界，为全法合规适用、执法判定、企业合规落地提供统一标准依据。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article6", "dimension": "BasicDefinition", "content_original": "## 第三条（个人信息保护原则） **【英文原文】**\\\\(1\\\\) Personal information controllers shall specify processing purposes and collect minimum necessary personal information lawfully and fairly\\\\. \\\\(2\\\\) Process personal information only for specified purposes and shall not use it beyond the scope\\\\. \\\\(3\\\\) Ensure personal information is accurate, complete and up\\\\-to\\\\-date for processing purposes\\\\. \\\\(4\\\\) Safely manage personal information considering infringement risks and severity\\\\. \\\\(5\\\\) Publicize privacy policies and guarantee data subjects\' rights including access rights\\\\. \\\\(6\\\\) Minimize privacy infringement risks in information processing\\\\. \\\\(7\\\\) Prioritize anonymization if possible, otherwise adopt pseudonymization to achieve processing purposes\\\\. \\\\(8\\\\) Endeavor to gain data subjects\' trust by complying with legal obligations\\\\. **【韩文原文】**① 개인정보처리자는 처리 목적을 명확히 하고 목적에 필요한 최소한의 개인정보만 적법·정당하게 수집하여야 한다\\\\. ② 처리 목적 범위 내에서 적합하게 처리하고 목적 외로 활용해서는 아니 된다\\\\. ③ 처리 목적에 필요한 범위에서 개인정보의 정확성, 완전성, 최신성을 보장해야 한다\\\\. ④ 권리 침해 가능성과 위험 정도를 고려하여 안전하게 관리해야 한다\\\\. ⑤ 개인정보 처리방침을 공개하고 정보주체의 열람권 등 권리를 보장해야 한다\\\\. ⑥ 정보주체의 사생활 침해를 최소화하는 방식으로 처리해야 한다\\\\. ⑦ 익명처리로 목적 달성이 가능하면 익명처리를, 불가능하면 가명처리를 해야 한다\\\\. ⑧ 법령상 의무를 준수하여 정보주체의 신뢰를 확보해야 한다\\\\. **【维度】**数据处理者义务 **【释义】**确立韩国个人信息处理八大核心基本原则，涵盖目的明确、最小必要收集、限定用途使用、信息精准有效、公开透明、隐私侵害最小化、匿名/假名分级处理、诚信合规履职，全方位约束所有个人信息处理者的合规行为，是日常业务合规的核心准则。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article7", "dimension": "DataSubjectRight", "content_original": "## 第四条（数据主体权利） **【英文原文】**A data subject has the following rights concerning personal information processing: 1\\\\. Right to be informed of information processing; 2\\\\. Right to choose and determine consent scope for processing; 3\\\\. Right to confirm processing status and request access, copy and transmission of personal information; 4\\\\. Right to suspend processing, request correction, erasure and destruction of personal information; 5\\\\. Right to fair remedy for damages caused by illegal processing; 6\\\\. Right to refuse or request explanation for fully automated processing decisions\\\\. **【韩文原文】**정보주체는 본인 개인정보 처리와 관련하여 다음 권리를 가진다\\\\. 1\\\\. 개인정보 처리 정보를 제공받을 권리 2\\\\. 처리 동의 여부와 범위를 선택·결정할 권리 3\\\\. 처리 여부 확인, 열람·사본 발급·전송 요구 권리 4\\\\. 처리 정지, 정정·삭제·파기 요구 권리 5\\\\. 처리로 발생한 피해를 신속·공정하게 구제받을 권리 6\\\\. 완전 자동화 처리 결정을 거부하고 설명을 요구할 권리 **【维度】**数据主体权利 **【释义】**法定赋予数据主体六项核心基础权利，全面覆盖知情权、同意决定权、查阅复制传输权、处理中止及更正删除权、损害救济权、自动化决策异议与解释权，全方位、体系化保障自然人的个人信息合法权益。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article8", "dimension": "MinorProtection", "content_original": "## 第五条（国家及地方自治团体职责） **【英文原文】**\\\\(1\\\\) The State and local governments shall formulate policies to prevent personal information abuse and excessive surveillance, and protect personal privacy and human dignity\\\\. \\\\(2\\\\) Establish institutional measures to protect data subjects\' statutory rights\\\\. \\\\(3\\\\) Formulate special protection policies for children under 14 to help them understand information processing impacts and personal rights\\\\. \\\\(4\\\\) Respect and support self\\\\-regulation activities of personal information controllers\\\\. \\\\(5\\\\) Apply relevant statutes in line with information protection principles to guarantee data subjects\' rights\\\\. **【韩文原文】**① 국가와 지방자치단체는 개인정보의 목적 외 수집, 오용·남용, 무분별한 감시를 방지하고 개인 사생활과 인간 존엄을 보호하는 정책을 수립해야 한다\\\\. ② 정보주체 권리 보호를 위한 법령 개선 등 제도적 조치를 마련해야 한다\\\\. ③ 14세 미만 아동이 정보 처리 영향과 본인 권리를 이해할 수 있도록 아동 개인정보 보호 정책을 추진해야 한다\\\\. ④ 개인정보처리자의 자율 보호 활동을 존중·지원해야 한다\\\\. ⑤ 개인정보 관련 법령 적용 시 정보 보호 원칙에 부합하도록 해 정보주체 권리를 보장해야 한다\\\\. **【维度】**监管职责 **【释义】**明确韩国国家及地方自治团体的顶层监管与治理职责，包含防范信息滥用与过度监控、完善权利保护制度、未成年人专项隐私保护、扶持行业自律、合规适用法规五大核心义务，构建政府主导的个人信息保护治理体系。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article9", "dimension": "DataControllerObligation", "content_original": "## 第六条（与其他法律的关系） **【英文原文】**\\\\(1\\\\) This Act shall apply to the processing and protection of personal information, except as otherwise prescribed by other statutes\\\\. \\\\(2\\\\) Any enactment or amendment of other personal information\\\\-related statutes shall conform to the purpose and principles of this Act\\\\. **【韩文原文】**① 개인정보 처리 및 보호에 관하여 다른 법률에 특별 규정이 없는 경우 이 법을 적용한다\\\\. ② 개인정보 관련 법률을 제정·개정할 때는 본 법의 목적과 원칙에 부합해야 한다\\\\. **【维度】**基础定义 **【释义】**确立KR\\\\-PIPA作为韩国个人信息保护通用基础法的法律地位，遵循「特别法优于普通法」适用规则，同时明确所有配套、细分领域信息保护法规的立法与修订，必须契合本法核心宗旨与基本原则，保障法律体系统一。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article10", "dimension": "DataControllerObligation", "content_original": "# 第二章 个人信息保护政策制定（第7条\\\\-第12条）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article11", "dimension": "DataControllerObligation", "content_original": "## 第七条（个人信息保护委员会设立） **【英文原文】**\\\\(1\\\\) The Personal Information Protection Commission is established under the Prime Minister to independently handle personal information protection affairs\\\\. \\\\(2\\\\) The Commission is deemed a central administrative agency, with partial exemptions from Government Organization Act provisions\\\\. **【韩文原文】**① 개인정보 보호 업무를 독립적으로 수행하기 위해 국무총리 소속으로 개인정보 보호위원회를 설치한다\\\\. ② 보호위원회는 중앙행정기관으로 간주하며, 일부 업무에 대해 정부조직법 일부 조항을 적용 제외한다\\\\. **【维度】**监管机构 **【释义】**设立独立的个人信息保护委员会，隶属于韩国总理府，明确其中央行政机关的法定地位，通过豁免部分行政组织法规约束，保障监管工作的独立性、权威性与专业性。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article12", "dimension": "DataControllerObligation", "content_original": "## 第七条之二（委员会组成） **【英文原文】**\\\\(1\\\\) The Commission consists of 9 commissioners, including 2 standing commissioners \\\\(Chairperson and Vice Chairperson\\\\)\\\\. \\\\(2\\\\) Commissioners are appointed by the President based on recommendations from the Prime Minister, Chairperson and political party negotiation bodies, selected from professionals in personal information protection, law and academia\\\\. \\\\(3\\\\) Chairperson and Vice Chairperson are political public officials\\\\. \\\\(4\\\\) Core leading members hold cabinet member status\\\\. **【韩文原文】**① 보호위원회는 상임위원 2명\\\\(위원장·부위원장 포함\\\\)을 포함한 9명의 위원으로 구성한다\\\\. ② 위원은 개인정보 보호 경력과 전문성을 갖춘 공무원, 법조인, 기관 임원, 학계 전문가 중 정당 추천·국무총리 제청으로 대통령이 임명한다\\\\. ③ 위원장과 부위원장은 정무직 공무원으로 임명한다\\\\. ④ 위원장, 부위원장, 사무처장은 내각 위원 지위를 가진다\\\\. **【维度】**监管机构 **【释义】**明确个人信息保护委员会的人员编制、遴选标准、任命流程及职级地位，委员会共9名委员，含2名常任委员，核心成员具备内阁职级，人员选自法律、信息保护、学术领域专业人才，保障监管团队专业度与决策权威性。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article13", "dimension": "DataControllerObligation", "content_original": "## 第七条之三（委员长职责） **【英文原文】**\\\\(1\\\\) The Chairperson represents the Commission, presides over meetings and oversees overall affairs\\\\. \\\\(2\\\\) Prescribed succession rules for absence or inability of Chairperson/Vice Chairperson\\\\. \\\\(3\\\\) The Chairperson may attend the National Assembly and state opinions or respond to inquiries\\\\. \\\\(4\\\\) May attend State Council meetings and propose relevant bills to the Prime Minister\\\\. **【韩文原文】**① 위원장은 위원회를 대표하고 회의를 주재하며 소관 업무를 총괄한다\\\\. ② 위원장·부위원장 부재 시 직무대행 규정을 정한다\\\\. ③ 위원장은 국회에 출석해 의견을 진술하고 질의에 답변해야 한다\\\\. ④ 국무회의에 출석하고 관련 법안 제출을 건의할 수 있다\\\\. **【维度】**监管职责 **【释义】**界定委员会委员长的核心职权，包含机构对外代表、会议主持、全盘业务统筹，明确职务空缺代行规则，同时赋予其国会应答、国务会议列席、法案建言的法定权限，打通监管与立法、行政体系衔接通道。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article14", "dimension": "DataControllerObligation", "content_original": "## 第七条之四（委员任期） **【英文原文】**\\\\(1\\\\) Commissioners serve a 3\\\\-year term, with one consecutive reappointment permitted\\\\. \\\\(2\\\\) Vacant positions shall be filled promptly, with new terms starting anew for successors\\\\. **【韩文原文】**① 위원 임기는 3년이며, 1회 연임 가능하다\\\\. ② 위원 결원 시 지체 없이 신규 위원을 임명하고, 후임 위원 임기는 새로 개시한다\\\\. **【维度】**监管机构 **【释义】**规范委员会委员任职机制，固定任期3年，允许连任1次；岗位出现空缺需及时补任，新任委员任期重新计算，保障监管团队人员稳定、履职连续。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article15", "dimension": "Penalty", "content_original": "## 第七条之五（委员身份保障） **【英文原文】**\\\\(1\\\\) Commissioners shall not be dismissed against their will except for mental/physical incapacity, disqualification or statutory duty violation\\\\. \\\\(2\\\\) Commissioners shall perform duties independently in compliance with laws and conscience\\\\. **【韩文原文】**① 위원은 심신장애, 결격사유 발생, 직무 의무 위반 외에는 본인 의사에 반해 면직되지 않는다\\\\. ② 위원은 법률과 양심에 따라 독립적으로 직무를 수행한다\\\\. **【维度】**监管机构 **【释义】**建立委员履职身份保障制度，严格限定免职情形，非因身心障碍、资格失效、履职违法不得强制免职；明确委员需依法、凭良心独立履职，不受外部不当干预，保障监管公正性。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article16", "dimension": "DataControllerObligation", "content_original": "## 第七条之六（禁止兼职） **【英文原文】**\\\\(1\\\\) Commissioners shall not concurrently hold public office, parliamentary positions or engage in profit\\\\-making business or political activities\\\\. \\\\(2\\\\) Profit\\\\-making business restrictions are prescribed by Presidential Decree\\\\. **【韩文原文】**① 위원은 국회의원, 공무원 등 직을 겸하거나 직무 관련 영리업무·정치활동에 참여할 수 없다\\\\. ② 영리업무 제한 세부 사항은 대통령령으로 정한다\\\\. **【维度】**监管合规 **【释义】**严格规避监管利益冲突，禁止委员兼任公职、议员，禁止从事营利性业务及参与政治活动，营利活动限制细则由总统令细化，全方位保障监管中立性。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article17", "dimension": "DataControllerObligation", "content_original": "## 第七条之七（任职资格限制） **【英文原文】**\\\\(1\\\\) Non\\\\-Korean nationals, disqualified public officials and political party members are ineligible for commissioner positions\\\\. \\\\(2\\\\) Commissioners falling under disqualification grounds shall be automatically dismissed\\\\. **【韩文原文】**① 비대한민국 국민, 공무원 결격사유자, 정당 당원은 위원이 될 수 없다\\\\. ② 결격사유에 해당하는 위원은 자동 퇴직한다\\\\. **【维度】**监管合规 **【释义】**明确委员任职负面准入清单，限定仅限韩国国籍、无公职失格、无政党身份人员任职；出现资格不符情形自动离职，从源头杜绝监管不公与利益绑定风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article18", "dimension": "Penalty", "content_original": "## 第七条之八（委员会管辖事务） **【英文原文】**The Commission shall be responsible for legal system improvement, policy formulation, right infringement investigation, dispute mediation, international cooperation, research education, technical support and other statutory personal information protection affairs\\\\. **【韩文原文】**보호위원회는 개인정보 보호 법령 개선, 정책·제도 수립, 권리침해 조사처분, 분쟁 조정, 국제협력, 연구교육, 기술지원 등 법령에 규정된 모든 개인정보 보호 업무를 수행한다\\\\. **【维度】**监管职责 **【释义】**全覆盖界定个人信息保护委员会法定职权，涵盖法规完善、政策制定、侵权查处、纠纷调解、国际合作、科研教育、技术赋能等全维度监管与服务工作，是韩国个人信息保护的核心执法机构。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article19", "dimension": "CrossBorderTransfer", "content_original": "## 第七条之九（委员会审议决议事项） **【英文原文】**The Commission shall deliberate and resolve on infringement factor assessment, master plans, policy and legal improvements, institutional coordination, legal interpretation, cross\\\\-border transfer suspension orders, penalty imposition and other core regulatory matters, with rights to collect opinions and inspect implementation status\\\\. **【韩文原文】**보호위원회는 개인정보 침해요인 평가, 기본계획 심의, 정책·법령 개선, 기관 간 의견조정, 법령 해석, 국외이전 중지명령, 과징금 부과 등 핵심 사항을 심의·의결하며, 의견 청취, 자료 요구, 이행 점검 권한을 가진다\\\\. **【维度】**监管职权 **【释义】**明确委员会必须审议表决的重大监管事项，包含风险评估、顶层规划、法规政策优化、跨部门协调、法条解释、跨境禁令、行政处罚等，同时赋予调研取证、意见征集、整改督导的配套执法权限。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article20", "dimension": "DataControllerObligation", "content_original": "## 第七条之十（会议规则） **【英文原文】**Commission meetings are convened by the Chairperson or upon request of over 1/4 commissioners\\\\. Resolutions require attendance of majority members and affirmative votes of present majority members\\\\. **【韩文原文】**위원회 회의는 위원장 또는 재적위원 4분의 1 이상 요구 시 소집하며, 재적위원 과반수 출석과 출석위원 과반수 찬성으로 의결한다\\\\. **【维度】**监管流程 **【释义】**标准化规范委员会议事决策流程，明确会议召集触发条件、法定出席人数及表决生效规则，保障监管决策流程严谨、合规、有效。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article21", "dimension": "DataControllerObligation", "content_original": "## 第七条之十一（委员回避制度） **【英文原文】**Commissioners shall recuse themselves from cases involving personal interest, kinship, prior consultation or agency relationship\\\\. Parties may challenge biased commissioners, and voluntary recusal is permitted\\\\. **【韩文原文】**위원은 본인·배우자·친족 관련 사건, 자문·대리 경력 사건, 이해관계 충돌 사건은 심의에서 제척된다\\\\. 당사자는 기피 신청 가능하며, 위원은 자발적 회피할 수 있다\\\\. **【维度】**监管合规 **【释义】**建立完善的监管回避机制，针对委员存在利害关系、亲属关联、业务代理关联的案件强制回避，同时支持当事人申请回避、委员自愿回避，彻底杜绝监管偏私风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article22", "dimension": "DataControllerObligation", "content_original": "## 第七条之十二（小组委员会） **【英文原文】**The Commission may establish sub\\\\-commissions composed of 3 members to handle minor, repetitive personal information infringement cases, whose resolutions are deemed as Commission official decisions\\\\. **【韩文原文】**보호위원회는 경미하거나 반복되는 침해 사건 처리용 3인 소위원회를 설치할 수 있으며, 소위원회 의결은 본 위원회 의결로 간주한다\\\\. **【维度】**监管机制 **【释义】**设立三人专项小组委员会，专门处置轻微、重复性个人信息侵权简易案件，小组决议等同于委员会正式裁决，大幅提升日常监管处置效率。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article23", "dimension": "DataControllerObligation", "content_original": "## 第七条之十三（事务处） **【英文原文】**A secretariat is established under the Commission to handle daily administrative affairs, with detailed organizational rules prescribed by Presidential Decree\\\\. **【韩文原文】**보호위원회에 사무처를 두어 일상 업무를 처리하며, 조직 운영 세부 사항은 대통령령으로 정한다\\\\. **【维度】**监管机构 **【释义】**设立委员会事务处作为常设执行机构，负责处理日常行政、业务落地工作，机构组织与运营细则由总统令细化规定，保障监管体系常态化运转。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article24", "dimension": "DataControllerObligation", "content_original": "## 第七条之十四（运营规则） **【英文原文】**Matters concerning Commission operation not specified in statutes shall be prescribed by internal Commission rules\\\\. **【韩文原文】**법령에 규정되지 않은 위원회 운영 사항은 위원회 내부 규칙으로 정한다\\\\. **【维度】**监管机制 **【释义】**赋予委员会自主规制权限，法律法规未明确的运营细则，可由委员会制定内部规则补充完善，健全监管制度体系。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article25", "dimension": "ComplianceAssessment", "content_original": "## 第八条之二（个人信息侵害因素评估） **【英文原文】**Central administrative agencies shall request the Commission to assess personal information infringement risks when enacting or amending statutes involving personal information processing\\\\. The Commission may provide improvement recommendations based on risk analysis\\\\. **【韩文原文】**중앙행정기관은 개인정보 처리 관련 법령 제·개정 시 보호위원회에 침해요인 평가를 요청해야 하며, 위원회는 분석 결과에 따라 개선 권고를 할 수 있다\\\\. **【维度】**合规评估 **【释义】**建立法规事前风险防控机制，所有涉及个人信息处理的新规制定、旧法修订，必须提请监管机构开展侵害风险评估，监管方有权出具合规优化、风险整改建议，从立法源头防控隐私风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article26", "dimension": "DataControllerObligation", "content_original": "## 第九条（基本保护规划） **【英文原文】**The Commission shall formulate a three\\\\-year master plan for personal information protection, covering core goals, institutional improvement, breach prevention, self\\\\-regulation, education and talent training\\\\. **【韩文原文】**보호위원회는 3년 주기로 개인정보 보호 기본계획을 수립하며, 기본 목표, 제도 개선, 침해 방지, 자율규제, 교육·인력 양성 등을 포함한다\\\\. **【维度】**监管政策 **【释义】**确立三年周期的个人信息保护顶层战略规划制度，规划必须包含核心目标、制度完善、风险防控、行业自律、普法教育、人才培养等核心内容，统筹行业长期合规发展。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article27", "dimension": "DataControllerObligation", "content_original": "## 第十条（年度实施计划） **【英文原文】**Central administrative agencies shall formulate annual implementation plans in accordance with the master plan, submit to the Commission for deliberation and implement after approval\\\\. **【韩文原文】**중앙행정기관은 기본계획에 기반한 연간 시행계획을 수립해 위원회에 제출하고, 심의·의결 후 시행해야 한다\\\\. **【维度】**监管政策 **【释义】**搭建「三年顶层规划\\\\+年度落地计划」双层政策落地体系，要求各级行政机关结合顶层战略制定年度执行方案，经监管委员会审议通过后方可实施，保障政策落地闭环。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article28", "dimension": "ComplianceAssessment", "content_original": "## 第十一条（资料提交与调查权限） **【英文原文】**The Commission may request compliance materials and conduct on\\\\-site investigations of personal information controllers and public institutions for plan formulation and performance evaluation\\\\. Relevant entities shall cooperate without extraordinary reasons\\\\. **【韩文原文】**보호위원회는 계획 수립·성과 평가를 위해 정보처리자 및 공공기관에 자료 제출을 요구하고 실태 조사를 실시할 수 있으며, 특별 사유 없이 협조해야 한다\\\\. **【维度】**监管职权 **【释义】**赋予监管机构刚性核查权限，可向所有信息处理者、公共机构调取合规资料、开展现场核查，被监管主体无特殊理由必须配合，保障监管核查落地。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article29", "dimension": "ComplianceAssessment", "content_original": "## 第十一条之二（个人信息保护水平评估） **【英文原文】**The Commission shall conduct annual protection level assessments on public institutions, disclose results, reward exemplary entities and issue improvement recommendations, with obligated institutions required to implement rectifications and feedback results\\\\. **【韩文原文】**보호위원회는 공공기관의 개인정보 보호 수준을 매년 평가하고 결과를 공개하며, 우수기관을 포상하고 개선 권고할 수 있다\\\\. 권고 받은 기관은 성실히 이행하고 결과를 통보해야 한다\\\\. **【维度】**监管考核 **【释义】**建立年度合规评级考核机制，针对公共机构开展个人信息保护水平专项评估，公开评估结果、表彰优秀主体、下发整改建议，要求被督导单位限期整改反馈，强化公共机构合规主体责任。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article30", "dimension": "DataControllerObligation", "content_original": "## 第十二条（个人信息保护指南） **【英文原文】**The Commission may formulate standard personal information protection guidelines for industry compliance\\\\. Central agencies may formulate field\\\\-specific guidelines based on national standards, and public institutions may establish internal management rules\\\\. **【韩文原文】**보호위원회는 표준 개인정보 보호지침을 제정해 업계 준수를 권장하고, 중앙기관은 분야별 세부 지침을 마련할 수 있으며, 공공기관은 내부 관리 기준을 수립할 수 있다\\\\. **【维度】**行业规范 **【释义】**构建分层级合规指引体系，由国家监管机构制定通用标准指南，中央机关细化行业专项细则，公共机构落地内部管理规范，为各类主体提供清晰、可落地的合规依据。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article31", "dimension": "DataControllerObligation", "content_original": "# 影像信息设备运营限制（第25条\\\\-第25条之2）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article32", "dimension": "DataControllerObligation", "content_original": "## 第二十五条（固定型影像信息处理设备运营限制） **【英文原文】**Fixed visual data processing devices \\\\(fixed cameras\\\\) may only be installed and operated for statutory permitted purposes including crime prevention, facility safety, traffic management\\\\. Installation is prohibited in privacy\\\\-sensitive spaces such as restrooms and changing rooms except for special institutional facilities\\\\. Operators shall install notice boards, prohibit sound recording, implement security measures, formulate management policies and may entrust third\\\\-party operation\\\\. **【韩文原文】**고정형 영상정보처리기기는 범죄 예방, 시설 안전, 교통단속 등 법정 허용 목적 외 공공장소에 설치·운영할 수 없다\\\\. 화장실, 탈의실 등 사생활 침해 장소에는 특수시설 제외 설치 금지한다\\\\. 운영자는 안내판 설치, 녹음 기능 사용 금지, 안전보호 조치, 관리방침 수립 의무가 있으며, 제3자에게 위탁 운영할 수 있다\\\\. **【维度】**特殊场景合规 **【释义】**严格规范固定监控摄像头等影像设备的合规运营，限定安装使用场景仅限安防、交通、犯罪预防等法定用途，禁止在卫生间、更衣室等隐私敏感区域安装；明确运营方公示、禁录音、安全防护、制度建设等强制义务，允许合规委托第三方运营。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article33", "dimension": "DataControllerObligation", "content_original": "## 第二十五条之二（移动型影像信息处理设备运营限制） **【英文原文】**Mobile visual data processing devices \\\\(portable/wearable cameras\\\\) may only shoot public scenes for statutory exempt purposes or when individuals do not refuse shooting with clear notification\\\\. Shooting in privacy\\\\-sensitive spaces is prohibited except for lifesaving purposes\\\\. Operators shall notify shooting status via light/sound/signs and comply with fixed device security management rules mutatis mutandis\\\\. **【韩文原文】**이동형 영상장치는 법정 예외 상황 또는 촬영 고지 후 개인이 거부하지 않은 경우에만 공공장소 촬영이 가능하다\\\\. 인명구조 목적 외 사생활 침해 장소 촬영은 금지한다\\\\. 촬영 시 빛·소리·안내판으로 고지해야 하며, 고정형 장치의 안전관리 규정을 준용한다\\\\. **【维度】**特殊场景合规 **【释义】**针对穿戴式、便携式移动拍摄设备制定专项隐私合规规则，限定公共场景拍摄条件、禁止隐私区域拍摄（救人场景除外），强制要求拍摄声光/标识告知，同步适用固定设备安全管理标准，适配移动设备高隐私风险特性。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article34", "dimension": "DataControllerObligation", "content_original": "# 信息委托与业务转让规范（第26条\\\\-第27条）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article35", "dimension": "Penalty", "content_original": "## 第二十六条（业务委托的个人信息处理限制） **【英文原文】**Personal information entrustment must be documented with purpose limitation, security safeguards and statutory requirements\\\\. Entrusting parties shall disclose entrustment details and processors, educate and supervise entrusted parties\\\\. Processors shall not exceed entrusted scope, require prior consent for re\\\\-entrustment, and bear employee\\\\-level liability for violations\\\\. Most PIPA compliance provisions apply mutatis mutandis to entrusted processors\\\\. **【韩文原文】**개인정보 처리 위탁 시 목적 외 사용 금지, 기술·관리 보호조치 등을 문서로 명시해야 한다\\\\. 위탁자는 위탁 내용·수탁자를 공개하고 수탁자를 교육·감독해야 한다\\\\. 수탁자는 위탁 범위 초과 처리 금지, 재위탁 시 위탁자 동의를 받아야 하며, 위반 시 위탁자 직원 수준의 책임을 부담한다\\\\. 수탁자는 본 법 대부분 규정을 준용해야 한다\\\\. **【维度】**数据处理者义务 **【释义】**全面规范个人信息外包委托全流程合规要求，明确委托方的合同约束、信息公示、受托方培训与监督义务；限定受托方处理权限、禁止超范围操作与擅自转委托，明确受托方违规追责标准，实现委托业务全链条责任闭环。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article36", "dimension": "BasicDefinition", "content_original": "## 第二十七条（业务转让的个人信息转移限制） **【英文原文】**In case of business transfer or merger involving personal information handover, the transferor shall notify data subjects of transfer facts, transferee information and consent withdrawal procedures in advance\\\\. The transferee shall confirm the transfer to data subjects and may only use the information for the original processing purpose\\\\. **【韩文原文】**영업 양도·합병으로 개인정보를 이전할 경우 위탁자는 정보주체에게 이전 사실, 양수자 정보, 동의 철회 절차를 사전 고지해야 한다\\\\. 양수자는 이전 사실을 통지하고, 최초 처리 목적 범위 내에서만 정보를 사용해야 한다\\\\. **【维度】**数据流转合规 **【释义】**针对企业并购、业务转让、主体变更场景的个人信息流转制定合规规则，明确转让方事前告知义务、受让方事后确认义务，严格限定受让方仅可在原处理目的范围内使用信息，杜绝主体变更后的信息滥用风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article37", "dimension": "DataControllerObligation", "content_original": "# 信息处理人员监管与假名信息特例（第28条\\\\-第28条之7）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article38", "dimension": "DataControllerObligation", "content_original": "## 第二十八条（信息处理人员监管） **【英文原文】**Personal information controllers shall minimize the scope of internal information handlers \\\\(employees, dispatched workers, part\\\\-timers\\\\) and conduct regular compliance education to ensure safe information handling\\\\. **【韩文原文】**개인정보처리자는 임직원, 파견·시간제 근로자 등 정보취급자 범위를 최소화하고, 정기적인 개인정보 보호 교육을 실시해야 한다\\\\. **【维度】**数据处理者义务 **【释义】**落实内部数据安全最小权限原则，要求企业严格压缩接触个人信息的员工、派遣、兼职人员范围，常态化开展隐私合规培训，从人员管控维度降低内部泄露、违规操作风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article39", "dimension": "DataControllerObligation", "content_original": "## 第二十八条之二（假名信息处理特例） **【英文原文】**Personal information controllers may process pseudonymized information without data subjects\' consent for statistical purposes, scientific research and public interest archiving\\\\. No individual identifiable information shall be included when providing pseudonymized information to third parties\\\\. **【韩文原文】**개인정보처리자는 통계 작성, 과학 연구, 공익 기록 보존 목적으로 정보주체 동의 없이 가명정보를 처리할 수 있다\\\\. 제3자 제공 시 개인 식별 정보를 포함해서는 안 된다\\\\. **【维度】**特殊处理特例 **【释义】**设立假名信息合规豁免机制，为统计调研、科学研究、公共利益存档等公益场景减负，无需获取数据主体同意即可处理假名信息；同时严格禁止对外提供假名信息时附带个人识别信息，保障隐私安全。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article40", "dimension": "DataControllerObligation", "content_original": "## 第二十八条之三（假名信息合并限制） **【英文原文】**Cross\\\\-institutional combination of pseudonymized information shall only be conducted by designated specialized institutions\\\\. Export of combined information requires re\\\\-pseudonymization and official approval\\\\. **【韩文原文】**서로 다른 기관의 가명정보 결합은 지정된 전문기관만 수행할 수 있다\\\\. 결합 정보를 외부로 반출하려면 재가명 처리 후 승인을 받아야 한다\\\\. **【维度】**特殊处理合规 **【释义】**严控跨机构假名数据融合风险，仅指定专业机构可开展跨主体数据合并操作，合并后数据对外导出必须二次假名处理并取得官方审批，严防数据融合后重识别个人身份的风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article41", "dimension": "DataControllerObligation", "content_original": "## 第二十八条之四（假名信息安全义务） **【英文原文】**Controllers shall separate and securely store restoration data for pseudonymized information, may set independent processing periods, and retain processing records for at least three years after data destruction\\\\. **【韩文原文】**가명정보 복원용 추가 정보를 분리 보관하고 안전조치를 취해야 한다\\\\. 처리 목적에 따라 별도 처리 기간을 정할 수 있으며, 처리 기록은 파기 후 3년 이상 보관해야 한다\\\\. **【维度】**数据处理者义务 **【释义】**明确假名信息专项安全管理规范，要求隔离存储数据还原密钥、落实安全防护措施，可按需设置独立数据处理周期，且数据销毁后需留存至少三年操作日志，实现全流程溯源管控。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article42", "dimension": "DataControllerObligation", "content_original": "## 第二十八条之五（假名信息处理禁止行为） **【英文原文】**Pseudonymized information shall not be processed for individual identification purposes\\\\. If identifiable personal information is generated during processing, controllers shall immediately suspend processing and retrieve/destroy relevant data\\\\. **【韩文原文】**가명정보로 특정 개인을 식별하려는 목적으로 처리해서는 안 된다\\\\. 처리 과정에서 식별 정보가 생성되면 즉시 처리 중지하고 회수·파기해야 한다\\\\. **【维度】**合规禁止行为 **【释义】**划定假名信息处理红线，严禁利用假名数据反向识别特定个人；若处理过程中意外生成可识别个人的信息，必须立即中止操作、回收并销毁数据，及时止损防控隐私风险。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article43", "dimension": "DataSubjectRight", "content_original": "## 第二十八条之七（适用排除范围） **【英文原文】**Partial provisions of PIPA including individual right confirmation, business transfer notification and data correction rules shall not apply to legally processed pseudonymized information\\\\. **【韩文原文】**법정 목적으로 처리된 가명정보에는 개인 권리 확인, 영업양도 통지, 정보 정정 등 일부 법령 조항을 적용하지 않는다\\\\. **【维度】**适用范围界定 **【释义】**明确合法处理的假名信息的法律豁免范围，无需适用普通个人信息的主体权利确认、业务转让告知、信息更正等规则，适配科研、统计等特殊场景的合规特性，兼顾隐私保护与数据利用价值。", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article44", "dimension": "CrossBorderTransfer", "content_original": "# 个人信息跨境传输（第二十八条之八）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "KR_PIPA", "law_name_en": "", "clause_no": "Chapter1-Article45", "dimension": "CrossBorderTransfer", "content_original": "## 第二十八条之八（个人信息跨境转移规则） **【英文原文】**Cross\\\\-border transfer, entrustment and storage of personal information is prohibited except for cases with separate data subject consent, statutory treaty provisions, contract performance necessity, certified overseas recipients or equivalent foreign protection systems\\\\. Controllers shall fully inform data subjects of transfer details, overseas recipient information and refusal procedures, and obtain renewed consent for any material changes\\\\. **【韩文原文】**개인정보의 국외 이전·위탁·저장은 정보주체 별도 동의, 법령·조약 규정, 계약 이행 필요성, 인증받은 해외 수신자, 국내 상당 수준의 보호제도를 갖춘 국가 외에는 금지된다\\\\. 이전 시 정보 항목, 국가, 방법, 수신자 정보, 거부 절차 등을 상세 고지해야 하며, 중요 사항 변경 시 재동의를 받아야 한다\\\\. **【维度】**跨境数据传输 **【释义】**确立韩国个人信息跨境传输、委托、境外存储的核心合规规则，明确五大合法出境场景，禁止无合规依据的跨境数据流转；强制要求出境前完整告知主体传输明细、接收方信息、拒绝渠道，核心事项变更需重新获取单独同意，全方位管控跨境数据风险。 > （注：部分内容可能由 AI 生成）", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article1", "dimension": "DataControllerObligation", "content_original": " # JP_APPI PoC Clean Archive # JP\\\\-APPI\\\\_日本个人信息保护法\\\\_clean\\\\.txt （平成十五年法律第五十七号） （令和八年六月二十四日 ―第百七十条\\\\)", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article30", "dimension": "DataControllerObligation", "content_original": "第七章 雑則\\\\(第百七十一条―第百七十五条\\\\)", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article31", "dimension": "DataControllerObligation", "content_original": "第八章 罰則\\\\(第百七十六条―第百八十五条\\\\) 附則", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article32", "dimension": "BasicDefinition", "content_original": "## 第一章 総則 **（目的）**", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article33", "dimension": "BasicDefinition", "content_original": "第一条 この法律は､デジタル社会の進展に伴い個人情報の利用が著しく拡大していることに鑑み､個人情報の適正な取扱いに関し､基本理念及び政府による基本方針の作成その他の個人情報の保護に関する施策の基本となる事項を定め､国及び地方公共団体の責務等を明らかにし､個人情報を取り扱う事業者及び行政機関等についてこれらの特性に応じて遵守すべき義務等を定めるとともに､個人情報保護委員会を設置することにより､行政機関等の事務及び事業の適正かつ円滑な運営を図り､並びに個人情報の適正かつ効果的な活用が新たな産業の創出並びに活力ある経済社会及び豊かな国民生活の実現に資するものとする。 **（定義）**", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article34", "dimension": "DataControllerObligation", "content_original": "第二条 この法律において｢個人情報｣とは､生存する個人に関する情報であって､次の各号のいずれかに該当するものをいう｡ 一 当該情報に含まれる氏名､生年月日その他の記述等\\\\(文書､図画若しくは電磁的記録\\\\(電磁的方式\\\\(電子的方式､磁気的方式その他人の知覚によっては認識することができない方式をいう｡次項第二号において同じ｡\\\\)で作られる記録をいう｡以下同じ｡\\\\)に記載され､若しくは記録され､又は音声､動作その他の方法を用いて表された一切の事項\\\\(個人識別符号を除く｡\\\\)をいう｡以下同じ｡\\\\)により特定の個人を識別することができるもの\\\\(他の情報と容易に照合することができ､それにより特定の個人を識別することができることとなるものを含む｡\\\\) 二 個人識別符号が含まれるもの ２ この法律において｢個人識別符号｣とは､次の各号のいずれかに該当する文字､番号､記号その他の符号のうち､政令で定めるものをいう｡ 一 特定個人の身体の一部、番号、記号その他の符号であって､当該特定の個人を識別することができるもの 二 個人に提供される役務の利用若しくは個人に販売される商品の購入に関し割り当てられ､又は個人に発行されるカードその他の書類に記載され､若しくは電磁的方式により記録された文字､番号､記号その他の符号であって､その利用者若しくは購入者又は発行を受ける者ごとに異なるものとなるように割り当てられ､又は記載され､若しくは記録されることにより､特定の利用者若しくは購入者又は発行を受ける者を識別することができるもの ３ この法律において｢要配慮個人情報｣とは､本人の人種､信条､社会的身分､病歴､犯罪の経歴､犯罪により害を被った事実その他本人に対する不当な差別､偏見その他の不利益が生じないようにその取扱いに特に配慮を要するものとして政令で定める記述等が含まれる個人情報をいう｡ ４ この法律において個人情報について｢本人｣とは､個人情報によって識別される特定の個人をいう｡ ５ この法律において｢仮名加工情報｣とは､次の各号に掲げる個人情報の区分に応じて当該各号に定める措置を講じて他の情報と照合しない限り特定の個人を識別することができないように個人情報を加工して得られる個人に関する情報をいう｡ 一 第一項第一号に該当する個人情報 当該個人情報に含まれる記述等の一部を削除すること\\\\(当該一部の記述等を復元することのできる規則性を有しない方法により他の記述等に置き換えることを含む｡\\\\)｡ 二 第一項第二号に該当する個人情報 当該個人情報に含まれる個人識別符号の全部を削除すること\\\\(当該個人識別符号を復元することのできる規則性を有しない方法により他の記述等に置き換えることを含む｡\\\\)｡ ６ この法律において｢匿名加工情報｣とは､次の各号に掲げる個人情報の区分に応じて当該各号に定める措置を講じて特定の個人を識別することができないように個人情報を加工して得られる個人に関する情報であって､当該個人情報を復元することができないようにしたものをいう｡ 一 第一項第一号に該当する個人情報 当該個人情報に含まれる記述等の一部を削除すること\\\\(当該一部の記述等を復元することのできる規則性を有しない方法により他の記述等に置き換えることを含む｡\\\\)｡ 二 第一項第二号に該当する個人情報 当該個人情報に含まれる個人識別符号の全部を削除すること\\\\(当該個人識別符号を復元することのできる規則性を有しない方法により他の記述等に置き換えることを含む｡\\\\)｡ ７ この法律において｢個人関連情報｣とは､生存する個人に関する情報であって､個人情報､仮名加工情報及び匿名加工情報のいずれにも該当しないものをいう｡ ８ この法律において｢行政機関｣とは､次に掲げる機関をいう｡ 一 法律の規定に基づき内閣に置かれる機関\\\\(内閣府を除く｡\\\\)及び内閣の所轄の下に置かれる機関", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article35", "dimension": "DataControllerObligation", "content_original": "二 内閣府､宮内庁並びに内閣府設置法\\\\(平成十一年法律第八十九号\\\\)第四十九条第一項及び第二項に規定する機関\\\\(これらの機関のうち第四号の政令で定める機関が置かれる機関にあっては､当該政令で定める機関を除く｡\\\\)", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article36", "dimension": "DataControllerObligation", "content_original": "三 国家行政組織法\\\\(昭和二十三年法律第百二十号\\\\)第三条第二項に規定する機関\\\\(第五号の政令で定める機関が置かれる機関にあっては､当該政令で定 , "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article69", "dimension": "BasicDefinition", "content_original": "７ この章､第六章及び第七章において｢個人関連情報取扱事業者｣とは､個人関連情報を含む情報の集合物であって､特定の個人関連情報を電子計算機を用いて検索することができるように体系的に構成したものその他特定の個人関連情報を容易に検索することができるように体系的に構成したものとして政令で定めるもの\\\\(第三十一条第一項において｢個人関連情報データベース等｣という｡\\\\)を事業の用に供している者をいう｡ただし､第二項各号に掲げる者を除く｡ ８ この章において｢学術研究機関等｣とは､大学その他の学術研究を目的とする機関若しくは団体又はそれらに属する者をいう｡", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article70", "dimension": "BasicDefinition", "content_original": "### 第二節 個人情報取扱事業者及び個人関連情報取扱事業者の義務 **（利用目的の特定）**", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article71", "dimension": "BasicDefinition", "content_original": "第十七条 個人情報取扱事業者は､個人情報を取り扱うに当たっては､その利用の目的\\\\(以下｢利用目的｣という｡\\\\)をできる限り特定しなければならない｡ ２ 個人情報取扱事業者は､利用目的を変更する場合には､変更前の利用目的と関連性を有すると合理的に認められる範囲を超えて行ってはならない｡ **（利用目的による制限）**", "content_en": "", "simple_explain": "PoC示范简要释义", "effective_date": "未明确", "pdf_name": "", "cdn_path": ""}, {"law_code": "JP_APPI", "law_name_en": "", "clause_no": "Chapter1-Article72", "dimension": "BasicDefinition", "content_original": "第十八条 個人情報取扱事業者は､あらかじめ本人の同意を得ないで､前条の規定により特定された利用目的の達成に必要な範囲を超えて､個人情報を取り扱ってはならない｡ ２ 個人情報取扱事業者は､合併その他の事由により他の個人情報取扱事業者から事業を承継することに伴って個人情報を取得した場合は､あらかじめ本人の同意を得ないで､承継前における当該個人情報の利用目的の達成に必要な範囲を超えて､当該個人情報を取り扱ってはならない｡ ３ 前二項の規定は､次に掲げる場合については､適用しない｡ 一 法令\\\\(条例を含む｡以下この章において同じ｡\\\\)に基づく場合 二 人の生命､身体又は財産の保護のために必要がある場合であって､本人の同意を得ることが困難であるとき｡ 三 公衆衛生の向上又は児童の健全な育成の推進のために特に必要がある場合であって､本人の同意を得ることが困難であるとき｡ 四 国の機関若しくは地方公共団体又はその委託を受けた者が法令の定める事務を遂行することに対して協力する必要がある場合であって､本人の同意を得ることにより当該事務の遂行に支障を及ぼすおそれがあるとき｡ 五 当該個人情報取扱事業者が学術研究機関等である場合であって､当該個人情報を学術研究の用に供する目的\\\\(以下この章において｢学術研究目的｣という｡\\\\)で取り扱う必要があるとき\\\\(当該個人情 const tableBody = document.getElementById('tableBody');
const selector = document.getElementById('dimSelect');

function render(filterDim){
    tableBody.innerHTML = "";
    let list;
    if(filterDim === "all"){
        list = fullDataset;
    }else{
        list = fullDataset.filter(item => item.dimension === filterDim);
    }
    if(list.length === 0){
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 4;
        td.className = "empty-tip";
        td.innerText = "No matching clauses under this dimension.";
        tr.appendChild(td);
        tableBody.appendChild(tr);
        return;
    }
    list.forEach(item=>{
        const tr = document.createElement("tr");
        let text = item.content_original.replaceAll("\n", "<br>");
        tr.innerHTML = `
            <td>${item.law_code}</td>
            <td>${item.clause_no}</td>
            <td>${item.dimension}</td>
            <td style="white-space:pre-line;">${text}</td>
        `;
        tableBody.appendChild(tr);
    })
}
render("all");
selector.onchange = function(){
    render(this.value);
}
